kind = "web"
previewPath = "/"
title = "Hypnosepraktijk De Droomreis"
version = "1.0.0"
id = "artifacts/hypnosepraktijk"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26151

[services.development]
run = "pnpm --filter @workspace/hypnosepraktijk run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hypnosepraktijk", "run", "build" ]
publicDir = "artifacts/hypnosepraktijk/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26151"
BASE_PATH = "/"
